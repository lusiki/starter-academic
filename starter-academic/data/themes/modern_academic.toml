# Modern Academic — Vercel/Linear/Geist-inspired minimal theme
# Grayscale, hairline borders, blue accent only on hover/active/focus.

name = "Modern Academic"

# Accent (used by Wowchemy for primary buttons / hover states).
primary       = "#2563EB"
primary_light = "#DBEAFE"
primary_dark  = "#1D4ED8"

# Navbar — near-white in light, near-black in dark (Wowchemy handles dark mode separately).
menu_primary     = "#FFFFFF"
menu_text        = "#737373"
menu_text_active = "#171717"
menu_title       = "#171717"

# Page backgrounds — no zebra striping; both odd and even use white.
background       = "#FFFFFF"
home_section_odd  = "#FFFFFF"
home_section_even = "#FAFAFA"

# Links — body color by default, accent on hover.
link       = "#171717"
link_hover = "#2563EB"
